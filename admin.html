<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Limerick GAA Hub · Quick Update</title>
  <meta name="theme-color" content="#006B3C" />
  <style>
    :root{
      --bg:#f4f6f5;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0b7a4a;
      --accent-2:#88C999;
      --danger:#b42318;
      --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.08);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    body{ padding:16px; }

    .wrap{
      max-width:760px;
      margin:0 auto;
      display:grid;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
    }

    h1{
      margin:0 0 6px;
      font-size:22px;
      line-height:1.2;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      gap:10px;
    }

    .grid-3{
      grid-template-columns:1fr 1fr 1fr;
    }

    .grid-2{
      grid-template-columns:1fr 1fr;
    }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin:0 0 6px;
    }

    input, select, textarea, button{
      width:100%;
      font:inherit;
      border-radius:12px;
    }

    input, select, textarea{
      border:1px solid var(--line);
      background:#fff;
      padding:12px;
      min-height:44px;
      color:var(--text);
    }

    textarea{
      min-height:180px;
      resize:vertical;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:13px;
    }

    button{
      border:0;
      padding:12px 14px;
      min-height:44px;
      font-weight:800;
      cursor:pointer;
    }

    .btn{
      background:var(--accent);
      color:#fff;
    }

    .btn-secondary{
      background:#eef7f1;
      color:var(--accent);
      border:1px solid rgba(11,122,74,.18);
    }

    .btn-danger{
      background:#fff1f2;
      color:var(--danger);
      border:1px solid #fecdd3;
    }

    .results{
      display:grid;
      gap:10px;
      max-height:48vh;
      overflow:auto;
    }

    .match{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
      cursor:pointer;
    }

    .match.active{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(11,122,74,.12);
      background:#f8fffb;
    }

    .match-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:6px;
    }

    .match-title{
      font-weight:800;
      font-size:16px;
      line-height:1.3;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      white-space:nowrap;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:800;
      background:#eef7f1;
      color:var(--accent);
      border:1px solid rgba(11,122,74,.18);
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .score-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .score-box{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fafafa;
    }

    .score-team{
      font-weight:800;
      margin-bottom:10px;
    }

    .score-fields{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .hidden{ display:none; }

    @media (max-width:640px){
      .grid-3,
      .grid-2,
      .score-grid,
      .actions{
        grid-template-columns:1fr;
      }

      body{ padding:12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>Quick Update</h1>
      <p class="sub">Hidden admin page for fast league result and fixture overrides.</p>
    </section>

    <section class="card">
      <div class="grid grid-3">
        <div>
          <label for="filter-date">Date</label>
          <input id="filter-date" type="date" />
        </div>
        <div>
          <label for="filter-group">Division</label>
          <select id="filter-group">
            <option value="">All divisions</option>
          </select>
        </div>
        <div>
          <label for="filter-search">Team search</label>
          <input id="filter-search" type="text" placeholder="e.g. Doon or Ballybrown" />
        </div>
      </div>
    </section>

    <section class="card">
      <div id="results-count" class="sub">Loading fixtures…</div>
      <div id="results" class="results"></div>
    </section>

    <section id="editor-card" class="card hidden">
      <div id="selected-summary" style="margin-bottom:14px;"></div>

      <div class="grid grid-2" style="margin-bottom:14px;">
        <div>
          <label for="edit-status">Status</label>
            <select id="edit-status">
                <option value="SCHEDULED">SCHEDULED</option>
                <option value="LIVE">LIVE</option>
                <option value="Result">Result</option>
                <option value="Final">Final</option>
                <option value="Walkover">Walkover</option>
                <option value="Postponed">Postponed</option>
                <option value="Cancelled">Cancelled</option>
                <option value="Abandoned">Abandoned</option>
              </select>
        </div>
        <div>
          <label for="edit-venue">Venue</label>
          <input id="edit-venue" type="text" />
        </div>
      </div>

      <div class="grid grid-2" style="margin-bottom:14px;">
        <div>
          <label for="edit-date">Date</label>
          <input id="edit-date" type="date" />
        </div>
        <div>
          <label for="edit-time">Time</label>
          <input id="edit-time" type="time" />
        </div>
      </div>

      <div class="score-grid" style="margin-bottom:14px;">
        <div class="score-box">
          <div id="home-team" class="score-team">Home</div>
          <div class="score-fields">
            <div>
              <label for="home-goals">Goals</label>
              <input id="home-goals" type="number" inputmode="numeric" min="0" step="1" />
            </div>
            <div>
              <label for="home-points">Points</label>
              <input id="home-points" type="number" inputmode="numeric" min="0" step="1" />
            </div>
          </div>
        </div>

        <div class="score-box">
          <div id="away-team" class="score-team">Away</div>
          <div class="score-fields">
            <div>
              <label for="away-goals">Goals</label>
              <input id="away-goals" type="number" inputmode="numeric" min="0" step="1" />
            </div>
            <div>
              <label for="away-points">Points</label>
              <input id="away-points" type="number" inputmode="numeric" min="0" step="1" />
            </div>
          </div>
        </div>
      </div>

      <div class="actions" style="margin-bottom:14px;">
        <button id="build-override" class="btn" type="button">Build override</button>
        <button id="reset-form" class="btn-secondary" type="button">Reset to fixture</button>
      </div>

      <div style="margin-bottom:8px;">
        <label for="override-output">Override JSON</label>
        <textarea id="override-output" spellcheck="false"></textarea>
      </div>

      <div class="actions">
        <button id="copy-override" class="btn-secondary" type="button">Copy JSON</button>
        <button id="clear-output" class="btn-danger" type="button">Clear output</button>
      </div>
    </section>
  </div>

  <script src="/admin.js"></script>
</body>
</html>

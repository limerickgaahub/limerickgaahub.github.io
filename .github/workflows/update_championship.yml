name: Update championship fixtures (Limerick GAA Hub)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "20 18 * * FRI"  # runs 18:20 UTC every Friday # disabled

permissions:
  contents: write

concurrency:
  group: limerickgaahub-championship-update
  cancel-in-progress: true

jobs:
  scrape_championship:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil pyyaml

      - name: Prepare tmp dir
        run: |
          rm -rf tmp_championship
          mkdir -p tmp_championship

      - name: Connectivity check (limerickgaa.ie)
        run: |
          # Don't fail job here; this is just to make logs clearer.
          curl -I --max-time 20 -L https://limerickgaa.ie/ || true
          curl -I --max-time 20 -L https://limerickgaa.ie/wp-json/ || true
          curl -I --max-time 20 -L https://limerickgaa.ie/senior-hurling-fixtures/ || true
          curl -I --max-time 20 -L https://limerickgaa.ie/intermediate-hurling-fixtures/ || true

      - name: Run championship scraper to tmp (retry)
        run: |
          set -e
          # Retry a few times in case the site times out transiently from GitHub runners.
          for i in 1 2 3 4; do
            echo "Attempt $i/4..."
            python scripts/scrape_championship_fixtures.py --outdir tmp_championship && break
            code=$?
            echo "Scraper failed with exit code $code"
            if [ "$i" -eq 4 ]; then
              exit $code
            fi
            sleep $((i*15))
          done

      - name: Upload debug artifacts (championship tmp)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: championship-tmp
          path: tmp_championship/**
          if-no-files-found: ignore

      - name: Promote hurling_2026.json only
        run: |
          if [ ! -f tmp_championship/hurling_2026.json ]; then
            echo "ERROR: tmp_championship/hurling_2026.json was not produced"
            exit 1
          fi
          mkdir -p data
          cp -a tmp_championship/hurling_2026.json data/hurling_2026.json

      - name: Commit championship data changes
        run: |
          CHANGES="$(git status --porcelain data/hurling_2026.json)"
          if [[ -n "$CHANGES" ]]; then
            git config user.name  "gha-bot"
            git config user.email "gha-bot@example.com"
            git add data/hurling_2026.json
            git commit -m "Auto-update championship fixtures"
            git fetch origin main
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes to commit."
          fi

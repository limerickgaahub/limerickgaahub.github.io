name: Update league fixtures (Limerick GAA Hub)

on:
  workflow_dispatch:
  # schedule:
  #  - cron: "20 18 * * FRI"  # runs 18:20 UTC every Friday # disabled

permissions:
  contents: write

concurrency:
  group: limerickgaahub-league-update
  cancel-in-progress: true

jobs:
  scrape_league:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil pyyaml

      - name: Clean tmp dir
        run: rm -rf tmp_league

      - name: Run league scraper to tmp
        run: python scripts/scrape_league_fixtures.py --outdir tmp_league

      - name: Upload debug artifacts (league tmp)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: league-tmp
          path: tmp_league/**
          if-no-files-found: ignore

      - name: Promote league.json only
        run: |
          if [ ! -f tmp_league/league.json ]; then
            echo "ERROR: tmp_league/league.json was not produced"
            exit 1
          fi
          mkdir -p data
          cp -a tmp_league/league.json data/league.json

      - name: Commit league data changes
        run: |
          CHANGES="$(git status --porcelain data/league.json)"
          if [[ -n "$CHANGES" ]]; then
            git config user.name  "gha-bot"
            git config user.email "gha-bot@example.com"
            git add data/league.json
            git commit -m "Auto-update league fixtures"
            git fetch origin main
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes to commit."
          fi
